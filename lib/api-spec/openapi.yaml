openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ascent 1.0 - Operational Intelligence Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard and operational health
  - name: workflows
    description: Workflow management
  - name: stages
    description: Workflow stages
  - name: assets
    description: Asset and warranty management
  - name: documents
    description: Document and evidence management
  - name: alerts
    description: Alerts and notifications
  - name: analytics
    description: Analytics and trends
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/intelligence:
    get:
      operationId: getDashboardIntelligence
      tags: [dashboard]
      summary: Get full dashboard intelligence bundle
      responses:
        "200":
          description: Dashboard intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardIntelligence"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get operational health summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/bottlenecks:
    get:
      operationId: getDashboardBottlenecks
      tags: [dashboard]
      summary: Get current bottleneck workflows and stages
      responses:
        "200":
          description: Bottleneck data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bottleneck"

  /dashboard/actions:
    get:
      operationId: getDashboardActions
      tags: [dashboard]
      summary: Get top priority actions
      responses:
        "200":
          description: Priority actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriorityAction"

  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List all workflows
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, paused, at_risk]
        - name: stoplight
          in: query
          schema:
            type: string
            enum: [red, yellow, green]
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a new workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowBody"
      responses:
        "201":
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get workflow by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetail"
    put:
      operationId: updateWorkflow
      tags: [workflows]
      summary: Update a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflowBody"
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
    delete:
      operationId: deleteWorkflow
      tags: [workflows]
      summary: Delete a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workflows/{id}/health:
    get:
      operationId: getWorkflowHealth
      tags: [workflows]
      summary: Get recalculated health and impact for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowHealth"

  /workflows/{id}/stages:
    get:
      operationId: listStages
      tags: [stages]
      summary: List stages for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stage"
    post:
      operationId: createStage
      tags: [stages]
      summary: Create a stage for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStageBody"
      responses:
        "201":
          description: Created stage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stage"

  /workflows/{id}/stages/{stageId}:
    put:
      operationId: updateStage
      tags: [stages]
      summary: Update a workflow stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageBody"
      responses:
        "200":
          description: Updated stage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stage"
    delete:
      operationId: deleteStage
      tags: [stages]
      summary: Delete a workflow stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workflows/{id}/items:
    get:
      operationId: listWorkflowItems
      tags: [workflows]
      summary: List items for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: stageId
          in: query
          schema:
            type: integer
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, completed, blocked]
      responses:
        "200":
          description: Workflow items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowItem"
    post:
      operationId: createWorkflowItem
      tags: [workflows]
      summary: Create a workflow item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowItemBody"
      responses:
        "201":
          description: Created workflow item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItem"

  /workflows/{id}/items/{itemId}:
    get:
      operationId: getWorkflowItem
      tags: [workflows]
      summary: Get a workflow item with history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItemDetail"
    put:
      operationId: updateWorkflowItem
      tags: [workflows]
      summary: Update a workflow item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflowItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItem"
    delete:
      operationId: deleteWorkflowItem
      tags: [workflows]
      summary: Delete a workflow item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workflows/{id}/items/{itemId}/move:
    post:
      operationId: moveWorkflowItem
      tags: [workflows]
      summary: Move a workflow item to a different stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveWorkflowItemBody"
      responses:
        "200":
          description: Moved item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItem"

  /workflows/{id}/items/{itemId}/history:
    get:
      operationId: getWorkflowItemHistory
      tags: [workflows]
      summary: Get movement history for a workflow item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movement history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowItemHistory"

  /workflows/{id}/bottleneck:
    get:
      operationId: getWorkflowBottleneck
      tags: [workflows]
      summary: Get bottleneck analysis for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bottleneck analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowBottleneckAnalysis"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all assets
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, maintenance, retired, critical]
      responses:
        "200":
          description: Assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetBody"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetBody"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assets/warranties:
    get:
      operationId: getWarrantyStatus
      tags: [assets]
      summary: Get warranty status overview for all assets
      responses:
        "200":
          description: Warranty status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WarrantyStatus"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents by entity
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
        - name: workflowId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a single document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts with filters
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, warning, info]
        - name: level
          in: query
          schema:
            type: string
            enum: [critical, warning, informational]
        - name: category
          in: query
          schema:
            type: string
            enum: [status_alert, timing_alert, flow_alert, risk_alert]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: workflowId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/summary:
    get:
      operationId: getAlertSummary
      tags: [alerts]
      summary: Get alert counts by level and status
      responses:
        "200":
          description: Alert summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSummary"

  /alerts/evaluate:
    post:
      operationId: evaluateAlerts
      tags: [alerts]
      summary: Trigger the alert engine evaluation
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertEvaluationResult"

  /alerts/{id}/read:
    patch:
      operationId: markAlertRead
      tags: [alerts]
      summary: Mark an alert as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/acknowledge:
    patch:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert (does not resolve it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/resolve:
    patch:
      operationId: resolveAlert
      tags: [alerts]
      summary: Manually resolve an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /analytics/trends:
    get:
      operationId: getAnalyticsTrends
      tags: [analytics]
      summary: Get score trends over time
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendData"

  /analytics/workflow-performance:
    get:
      operationId: getWorkflowPerformance
      tags: [analytics]
      summary: Get workflow performance breakdown
      responses:
        "200":
          description: Performance data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowPerformance"

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List all properties
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Created property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}:
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property and its units
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /units:
    get:
      operationId: listUnits
      tags: [properties]
      summary: List all units (optionally filtered by property)
      parameters:
        - name: propertyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Unit"
    post:
      operationId: createUnit
      tags: [properties]
      summary: Create a single unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnitBody"
      responses:
        "201":
          description: Created unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"

  /units/import:
    post:
      operationId: importUnits
      tags: [properties]
      summary: Bulk import units (CSV-parsed rows) into a property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUnitsBody"
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUnitsResult"

  /units/{id}:
    delete:
      operationId: deleteUnit
      tags: [properties]
      summary: Delete a unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Stoplight:
      type: string
      enum: [red, yellow, green]

    DashboardIntelligence:
      type: object
      properties:
        executiveSnapshot:
          $ref: "#/components/schemas/ExecutiveSnapshot"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/IntelligenceAction"
        primaryBottleneck:
          $ref: "#/components/schemas/BottleneckStory"
          nullable: true
        stageDistribution:
          type: array
          items:
            $ref: "#/components/schemas/StageDistributionRow"
        workflowSpotlight:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowSpotlightEntry"
        trends:
          type: array
          items:
            $ref: "#/components/schemas/TrendSignal"
        generatedAt:
          type: string
      required:
        - executiveSnapshot
        - actions
        - stageDistribution
        - workflowSpotlight
        - trends
        - generatedAt

    ExecutiveSnapshot:
      type: object
      properties:
        operationalHealthScore:
          type: number
        stoplight:
          type: string
        insight:
          type: string
        criticalItemsCount:
          type: integer
        openItemsCount:
          type: integer
        overdueItemsCount:
          type: integer
        activeWorkflowsCount:
          type: integer
        completedWorkflowsCount:
          type: integer
        biggestBottleneck:
          type: string
          nullable: true
        biggestBottleneckExplanation:
          type: string
          nullable: true
        throughputPercent:
          type: number
        throughputLabel:
          type: string
        improvementSignal:
          type: string
        longestAgingItem:
          type: object
          nullable: true
          properties:
            title:
              type: string
            daysInStage:
              type: integer
            workflowTitle:
              type: string
      required:
        - operationalHealthScore
        - stoplight
        - insight
        - criticalItemsCount
        - openItemsCount
        - overdueItemsCount
        - activeWorkflowsCount
        - completedWorkflowsCount
        - throughputPercent
        - throughputLabel
        - improvementSignal

    IntelligenceAction:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
          enum: [critical_item, bottleneck, overdue, unassigned, health, aging]
        urgency:
          type: string
          enum: [critical, high, medium]
        title:
          type: string
        reason:
          type: string
        actionPath:
          type: string
        workflowId:
          type: integer
          nullable: true
        workflowTitle:
          type: string
          nullable: true
        metadata:
          type: object
      required:
        - id
        - category
        - urgency
        - title
        - reason
        - actionPath

    BottleneckStory:
      type: object
      properties:
        workflowId:
          type: integer
        workflowTitle:
          type: string
        stageName:
          type: string
        stageId:
          type: integer
        itemCount:
          type: integer
        maxAgeDays:
          type: integer
        avgAgeDays:
          type: integer
        hasCritical:
          type: boolean
        stoplight:
          type: string
        impactSummary:
          type: string
        recommendation:
          type: string
      required:
        - workflowId
        - workflowTitle
        - stageName
        - stageId
        - itemCount
        - maxAgeDays
        - avgAgeDays
        - hasCritical
        - stoplight
        - impactSummary
        - recommendation

    StageDistributionRow:
      type: object
      properties:
        workflowId:
          type: integer
        workflowTitle:
          type: string
        stageId:
          type: integer
        stageName:
          type: string
